<html lang="zh-CN">
<head>

    <title>济大校园植物图鉴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            background-color: #f8f9f7;
            padding-bottom: 80px;
        }

        /* 顶部header */
        .header {
            background-color: #194c2a;
            color: white;
            padding: 16px 20px;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            background-color: #4cc988;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }
        .header-title h1 {
            font-size: 22px;
            font-weight: 600;
        }
        .header-title p {
            font-size: 16px;
            opacity: 0.9;
        }
        .header .menu-icon {
            font-size: 24px;
        }
        .header-subtitle h2 {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .header-subtitle p {
            font-size: 18px;
            opacity: 0.9;
        }

        /* 搜索框 */
        .search-wrap {
            background-color: white;
            padding: 16px 20px;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: #f3f6f4;
            border-radius: 12px;
            padding: 14px 16px;
            gap: 10px;
        }
        .search-box .icon {
            color: #194c2a;
            font-size: 18px;
        }
        .search-box input {
            border: none;
            background: transparent;
            flex: 1;
            font-size: 16px;
            outline: none;
        }

        /* 筛选区域 */
        .filter-section {
            background-color: white;
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
        }
        .filter-row {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0;
            margin-bottom: 12px;
        }
        .filter-row:last-child {
            margin-bottom: 0;
        }
        .filter-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        .filter-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: white;
            white-space: nowrap;
            font-size: 15px;
            cursor: pointer;
        }
        .filter-btn.active {
            background-color: #194c2a;
            color: white;
            border-color: #194c2a;
        }
        .filter-btn .icon {
            font-size: 18px;
        }

        /* 植物列表 */
        .plant-container {
            padding: 16px 20px;
        }
        .plant-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .plant-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            position: relative;
        }
        .plant-card .collect-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            z-index: 2;
        }
        .plant-card .collect-btn.active {
            color: #ff4444;
        }
        .plant-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }
        .plant-info {
            padding: 12px;
        }
        .plant-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .plant-latin {
            font-size: 14px;
            color: #666;
            font-style: italic;
            margin-bottom: 8px;
        }
        .plant-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .plant-tag {
            background-color: #e8f1eb;
            color: #194c2a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
        }

        /* 底部导航 */
        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #eee;
            height: 70px;
            z-index: 10;
        }
        .nav-item {
            text-align: center;
            color: #888;
            font-size: 13px;
        }
        .nav-item.active {
            color: #194c2a;
        }
        .nav-item .icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 500px;
            margin: 40px auto;
            overflow: hidden;
        }
        .modal-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .modal-body {
            padding: 20px;
        }
        .modal-title {
            font-size: 22px;
            margin-bottom: 6px;
        }
        .modal-latin {
            font-size: 15px;
            color: #666;
            font-style: italic;
            margin-bottom: 12px;
        }
        .modal-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        /* 详情分段样式 */
        .detail-item {
            margin-bottom: 14px;
            line-height: 1.7;
        }
        .detail-label {
            font-weight: 600;
            color: #194c2a;
            margin-right: 6px;
        }
        /* 详情页底部图片位 */
        .detail-bottom-img {
            width: 100%;
            height: 180px;
            margin-top: 10px;
            border-radius: 10px;
            object-fit: cover;
            background: #f3f6f4;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
        }

        /* 空状态 */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
    </style>
</head>

// ===================== 全局变量 =====================
let currentLifeForm = "all";
let currentFamily = "all";
let showCollectOnly = false;
let collectionList = JSON.parse(localStorage.getItem("judaPlantCollect")) || [];

// ===================== 初始化 =====================
window.onload = function () {
    document.getElementById("totalCount").textContent = plantData.length;
    renderPlantList();
    bindEvents();
};

// ===================== 渲染列表 =====================
function renderPlantList() {
    const listEl = document.getElementById("plantList");
    const emptyEl = document.getElementById("emptyTip");
    let data = [...plantData];

    if (showCollectOnly) {
        data = data.filter(item => collectionList.includes(item.id));
    }
    if (currentLifeForm !== "all") {
        data = data.filter(item => item.lifeForm === currentLifeForm);
    }
    if (currentFamily !== "all") {
        data = data.filter(item => item.family.includes(currentFamily));
    }

    const keyword = document.getElementById("searchInput").value.toLowerCase();
    if (keyword) {
        data = data.filter(item => 
            item.name.toLowerCase().includes(keyword) ||
            item.latin.toLowerCase().includes(keyword) ||
            item.family.toLowerCase().includes(keyword) ||
            item.alias.toLowerCase().includes(keyword) ||
            item.shape.toLowerCase().includes(keyword)
        );
    }

    document.getElementById("resultCount").textContent = data.length;
    if (data.length === 0) {
        listEl.innerHTML = "";
        emptyEl.style.display = "block";
        return;
    }
    emptyEl.style.display = "none";

    let html = "";
    data.forEach(item => {
        const isCollect = collectionList.includes(item.id) ? "active" : "";
        html += `
            <div class="plant-card" data-id="${item.id}">
                <div class="collect-btn ${isCollect}" data-id="${item.id}">♥</div>
                <img src="${item.img}" class="plant-img" alt="${item.name}">
                <div class="plant-info">
                    <div class="plant-name">${item.name}</div>
                    <div class="plant-latin">${item.latin}</div>
                    <div class="plant-tags">
                        <span class="plant-tag">${item.family}</span>
                        <span class="plant-tag">${item.lifeForm}</span>
                    </div>
                </div>
            </div>
        `;
    });
    listEl.innerHTML = html;
}

// ===================== 打开详情 =====================
function openDetail(id) {
    const plant = plantData.find(p => p.id == id);
    if (!plant) return;

    document.getElementById("modalImg").src = plant.img;
    document.getElementById("modalName").textContent = plant.name;
    document.getElementById("modalLatin").textContent = plant.latin;
    document.getElementById("modalAlias").textContent = plant.alias;
    document.getElementById("modalShape").textContent = plant.shape;
    document.getElementById("modalValue").textContent = plant.value;
    document.getElementById("modalCulture").textContent = plant.culture;
    
    document.getElementById("modalBottomImg").src = plant.bottomImg;
    document.getElementById("modalBottomImg").alt = plant.name;

    document.getElementById("modalTags").innerHTML = `
        <span class="plant-tag">${plant.family}</span>
        <span class="plant-tag">${plant.lifeForm}</span>
    `;

    document.getElementById("plantModal").style.display = "block";
}

// ===================== 收藏/取消收藏 =====================
function toggleCollect(id) {
    id = Number(id);
    const index = collectionList.indexOf(id);
    if (index > -1) {
        collectionList.splice(index, 1);
    } else {
        collectionList.push(id);
    }
    localStorage.setItem("judaPlantCollect", JSON.stringify(collectionList));
    renderPlantList();
}

// ===================== 绑定事件 =====================
function bindEvents() {
    document.getElementById("searchInput").addEventListener("input", renderPlantList);

    document.querySelectorAll("#lifeFormFilter .filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll("#lifeFormFilter .filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentLifeForm = btn.dataset.life;
            renderPlantList();
        });
    });

    document.querySelectorAll("#familyFilter .filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll("#familyFilter .filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFamily = btn.dataset.family;
            renderPlantList();
        });
    });

    document.getElementById("plantList").addEventListener("click", (e) => {
        const card = e.target.closest(".plant-card");
        const collectBtn = e.target.closest(".collect-btn");
        if (collectBtn) {
            toggleCollect(collectBtn.dataset.id);
            e.stopPropagation();
        } else if (card) {
            openDetail(card.dataset.id);
        }
    });

    document.querySelector(".close-btn").addEventListener("click", () => {
        document.getElementById("plantModal").style.display = "none";
    });
    document.getElementById("plantModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("plantModal")) {
            document.getElementById("plantModal").style.display = "none";
        }
    });

    document.querySelectorAll(".footer-nav .nav-item").forEach(item => {
        item.addEventListener("click", () => {
            document.querySelectorAll(".footer-nav .nav-item").forEach(i => i.classList.remove("active"));
            item.classList.add("active");
            const tab = item.dataset.tab;
            if (tab === "collect") {
                showCollectOnly = true;
            } else if (tab === "browse") {
                showCollectOnly = false;
            } else {
                alert("该功能后续可扩展");
            }
            renderPlantList();
        });
    });
}
</script>
